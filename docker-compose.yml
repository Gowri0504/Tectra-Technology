# ============================================
# PRODUCTION DOCKER COMPOSE CONFIGURATION
# ============================================

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  db:
    image: postgres:15-alpine
    container_name: saas_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-saas_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - saas_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-saas_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    shm_size: '256mb'

  # ============================================
  # Redis Cache
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: saas_redis
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - saas_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    command: redis-server --appendonly yes

  # ============================================
  # Backend API Server
  # ============================================
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: saas_backend
    restart: always
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-saas_db}
      REDIS_URL: redis://redis:6379
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET:-change_this_secret_in_production_minimum_32_chars}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-change_this_secret_in_production_minimum_32_chars}
      PORT: ${PORT:-5000}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
    networks:
      - saas_network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    command: ["sh", "-c", "npx prisma migrate deploy && node dist/index.js"]

  # ============================================
  # Frontend Next.js Application
  # ============================================
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: saas_frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000/api}
    networks:
      - saas_network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

# ============================================
# Networks
# ============================================
networks:
  saas_network:
    driver: bridge
    name: saas_network

# ============================================
# Volumes (Persistent Data)
# ============================================
volumes:
  postgres_data:
    name: saas_postgres_data
  redis_data:
    name: saas_redis_data
