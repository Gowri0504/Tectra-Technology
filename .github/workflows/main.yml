name: Enterprise CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test_and_build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: saas_test_db
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18
        cache: 'npm'

    - name: Install & Test Backend
      run: |
        cd server
        npm install
        npx prisma generate
        npm run lint
        # npm test (Uncomment when tests are added)

    - name: Build Backend
      run: |
        cd server
        npm run build

    - name: Install & Build Frontend
      run: |
        cd client
        npm install
        npm run lint
        npm run build

    - name: Build Docker Images
      run: |
        docker-compose build
